<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZZW's Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto+Mono:wght@400;500;600&family=Oswald:wght@400;500;600&family=Bungee&family=M+PLUS+Rounded+1c:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-medium: #16213e;
            --bg-light: #0f3460;
            --accent-gold: #e94560;
            --accent-pink: #ff6b6b;
            --accent-coral: #feca57;
            --accent-peach: #ff9ff3;
            --text-light: #f8f8f8;
            --text-muted: #a0a0a0;
            --text-gold: #feca57;
            --card-bg: #232741;
            --card-hover: #2d3154;
            --border-subtle: #3d4466;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'M PLUS Rounded 1c', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(145deg, var(--bg-dark) 0%, var(--bg-medium) 50%, #1f4068 100%);
            min-height: 100vh;
            color: var(--text-light);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: linear-gradient(180deg, rgba(26,26,46,0.98) 0%, rgba(22,33,62,0.95) 100%);
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 4px 30px rgba(0,0,0,0.4);
            border-bottom: 3px solid var(--accent-gold);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3em;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--text-gold) 0%, var(--accent-coral) 50%, var(--accent-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        header h1 a {
            text-decoration: none;
            color: inherit;
        }

        .user-bar {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9em;
        }

        .user-bar a {
            color: var(--text-gold);
            cursor: pointer;
            transition: color 0.2s;
            text-decoration: none;
        }

        .user-bar a:hover {
            color: var(--accent-pink);
        }

        /* Loading */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border-subtle);
            border-top: 4px solid var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .fade-in {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        /* Album Grid */
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .album-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            border: 1px solid var(--border-subtle);
        }

        .album-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(233,69,96,0.15);
            border-color: var(--accent-gold);
        }

        .album-card:nth-child(1) { animation-delay: 0ms; }
        .album-card:nth-child(2) { animation-delay: 80ms; }
        .album-card:nth-child(3) { animation-delay: 160ms; }
        .album-card:nth-child(4) { animation-delay: 240ms; }
        .album-card:nth-child(5) { animation-delay: 320ms; }
        .album-card:nth-child(6) { animation-delay: 400ms; }

        .album-cover {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--accent-gold) 100%);
            transition: transform 0.3s ease;
        }

        .album-card:hover .album-cover {
            transform: scale(1.05);
        }

        .album-cover-placeholder {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--accent-gold) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            color: rgba(255,255,255,0.5);
        }

        .album-cover-wrapper {
            overflow: hidden;
            position: relative;
        }

        .album-info {
            padding: 20px;
        }

        .album-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.4em;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .album-description {
            font-size: 0.95em;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .album-meta {
            font-size: 0.85em;
            color: var(--text-gold);
            font-weight: 500;
        }

        /* Album Page */
        .album-header {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid var(--border-subtle);
        }

        .album-header h2 {
            font-family: 'Oswald', serif;
            font-size: 2.5em;
            color: var(--text-light);
            margin-bottom: 15px;
        }

        .album-full-description {
            font-size: 1.1em;
            color: var(--text-muted);
            line-height: 1.8;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-subtle);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 25px;
            color: var(--text-gold);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent-pink);
        }

        /* Photos Grid */
        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .photo-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            border: 1px solid var(--border-subtle);
        }

        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(233,69,96,0.2);
        }

        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .photo-card:hover img {
            transform: scale(1.02);
        }

        .photo-details {
            padding: 18px;
        }

        .photo-title {
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 6px;
            font-size: 1.1em;
        }

        .photo-description {
            font-size: 0.9em;
            color: var(--text-muted);
        }

        /* Rating */
        .rating-container {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-subtle);
        }

        .rating-stars {
            display: flex;
            gap: 4px;
        }

        .rating-star {
            font-size: 1.5em;
            color: #444;
            cursor: pointer;
            transition: color 0.15s, transform 0.15s;
        }

        .rating-star.active,
        .rating-star:hover {
            color: var(--accent-coral);
            transform: scale(1.2);
        }

        .rating-info {
            font-size: 0.85em;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .rating-login-prompt {
            font-size: 0.9em;
            color: var(--accent-gold);
            margin-top: 10px;
        }

        .rating-login-prompt a {
            color: var(--text-gold);
            cursor: pointer;
            text-decoration: underline;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-pink) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233,69,96,0.4);
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-light);
            border: 1px solid var(--border-subtle);
        }

        .btn-secondary:hover {
            background: var(--card-hover);
            border-color: var(--text-gold);
        }

        .btn-danger {
            background: linear-gradient(135deg, #c0392b 0%, #8e2a2a 100%);
            color: white;
        }

        .btn-danger:hover {
            box-shadow: 0 5px 20px rgba(192,57,43,0.4);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.9em;
        }

        /* Edit Icons */
        .edit-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-size: 14px;
            border: 2px solid transparent;
        }

        .edit-btn:hover {
            background: var(--accent-gold);
            transform: scale(1.1);
            border-color: white;
        }

        .edit-btn-album {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
        }

        .admin-photo-edit .edit-btn {
            position: absolute;
            top: 8px;
            right: 8px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.5);
            border: 1px solid var(--border-subtle);
            animation: fadeInUp 0.3s ease-out;
        }

        .modal h3 {
            color: var(--text-gold);
            margin-bottom: 25px;
            font-family: 'Oswald', serif;
            font-size: 1.6em;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border-subtle);
            border-radius: 10px;
            font-size: 1em;
            background: var(--bg-dark);
            color: var(--text-light);
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9em;
            margin-top: 12px;
            text-align: center;
            padding: 10px;
            background: rgba(231,76,60,0.1);
            border-radius: 8px;
        }

        /* Upload */
        .upload-zone {
            border: 3px dashed var(--border-subtle);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
            background: var(--bg-dark);
        }

        .upload-zone:hover {
            border-color: var(--accent-gold);
            background: rgba(233,69,96,0.05);
        }

        .upload-zone.dragover {
            border-color: var(--accent-gold);
            background: rgba(233,69,96,0.1);
        }

        .upload-progress {
            height: 8px;
            background: var(--bg-dark);
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }

        .upload-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-pink));
            transition: width 0.3s;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 2.5em;
            color: white;
            cursor: pointer;
            transition: color 0.2s;
        }

        .lightbox-close:hover {
            color: var(--accent-gold);
        }

        /* Admin */
        .admin-actions-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .admin-cover-section {
            margin: 30px 0;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
        }

        .admin-cover-section h3 {
            color: var(--text-gold);
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        /* Login */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }

        .login-box {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-subtle);
        }

        .login-box h2 {
            text-align: center;
            color: var(--text-gold);
            font-family: 'Oswald', serif;
            margin-bottom: 35px;
            font-size: 2em;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            margin-top: 60px;
            border-top: 1px solid var(--border-subtle);
        }

        footer p {
            font-size: 0.9em;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            color: var(--text-gold);
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        /* Section Title */
        .section-title {
            text-align: center;
            margin: 40px 0;
            font-family: 'Oswald', serif;
            font-size: 2.2em;
            color: var(--text-gold);
        }

        /* Photo Upload Item */
        .photo-upload-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .photo-upload-item img {
            width: 70px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
                letter-spacing: 2px;
            }

            .albums-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }

            .photos-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }

            .album-header {
                padding: 25px;
            }

            .album-header h2 {
                font-size: 1.8em;
            }

            .user-bar {
                position: static;
                justify-content: center;
                margin-top: 15px;
            }

            .login-box {
                padding: 30px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const API_BASE = '';

        let currentUser = null;
        let userToken = null;

        function loadUserFromStorage() {
            const stored = localStorage.getItem('gallery_user');
            if (stored) {
                const data = JSON.parse(stored);
                currentUser = data.user;
                userToken = data.token;
            }
        }

        function saveUserToStorage(user, token) {
            localStorage.setItem('gallery_user', JSON.stringify({ user, token }));
            currentUser = user;
            userToken = token;
        }

        function clearUserFromStorage() {
            localStorage.removeItem('gallery_user');
            currentUser = null;
            userToken = null;
        }

        async function apiCall(endpoint, options = {}) {
            const defaultHeaders = { 'Content-Type': 'application/json' };
            if (currentUser && userToken) {
                defaultHeaders['X-User-ID'] = currentUser.id;
                defaultHeaders['X-Token'] = userToken;
            }
            const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers: { ...defaultHeaders, ...options.headers } });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Request failed');
            return data;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function renderHeader(nav = true) {
            return `
                <header>
                    <div class="user-bar">
                        ${currentUser ? `
                            <span>Welcome, ${currentUser.username}!</span>
                            <a onclick="logout()">Logout</a>
                        ` : `
                            <a onclick="showAuthModal('login')">Login</a>
                            <a onclick="showAuthModal('register')">Register</a>
                        `}
                    </div>
                    <h1><a href="/">RZZW's Gallery</a></h1>
                </header>
            `;
        }

        function renderFooter() {
            return `<footer><p>&copy; 2024 RZZW's Gallery. Rights to all photos reserved.</p></footer>`;
        }

        function renderLoading() {
            return `<div class="loading-container"><div class="spinner"></div></div>`;
        }

        async function renderHome() {
            const app = document.getElementById('app');
            app.innerHTML = renderHeader() + renderLoading() + renderFooter();
            try {
                const albums = await apiCall('/api/albums');
                app.innerHTML = renderHeader() + `
                    <div class="container">
                        <h2 class="section-title">My Albums</h2>
                        ${albums.length === 0 ? `
                            <div class="empty-state">
                                <h3>No albums</h3>
                                <p>Go to admin panel to create your first album.</p>
                            </div>
                        ` : `
                            <div class="albums-grid">
                                ${albums.map((album, index) => `
                                    <a href="/album/${album.slug}" class="album-card fade-in" style="animation-delay: ${index * 80}ms">
                                        <div class="album-cover-wrapper">
                                            ${album.cover_image ? `<img src="/uploads/albums/${album.cover_image}" alt="${album.title}" class="album-cover">` : `<div class="album-cover-placeholder">📷</div>`}
                                        </div>
                                        <div class="album-info">
                                            <div class="album-title">${album.title}</div>
                                            <div class="album-description">${album.short_description || 'No description'}</div>
                                            <div class="album-meta">${album.photo_count || 0} photos • ${formatDate(album.created_at)}</div>
                                        </div>
                                    </a>
                                `).join('')}
                            </div>
                        `}
                    </div>
                ` + renderFooter();
            } catch (error) {
                app.innerHTML = renderHeader() + `<div class="container"><div class="error-message">Error: ${error.message}</div></div>` + renderFooter();
            }
        }

        async function renderAlbum(slug) {
            const app = document.getElementById('app');
            app.innerHTML = renderHeader() + renderLoading() + renderFooter();
            try {
                const data = await apiCall(`/api/albums/${slug}`);
                app.innerHTML = renderHeader() + `
                    <div class="container fade-in">
                        <a href="/" class="back-link">← Back</a>
                        <div class="album-header">
                            <h2>${data.album.title}</h2>
                            ${data.album.full_description ? `<p class="album-full-description">${data.album.full_description}</p>` : ''}
                        </div>
                        ${data.photos.length === 0 ? `
                            <div class="empty-state"><h3>No photos</h3></div>
                        ` : `
                            <div class="photos-grid">
                                ${data.photos.map((photo, index) => renderPhotoCard(photo, index)).join('')}
                            </div>
                        `}
                    </div>
                ` + renderFooter();
                setupRatingListeners();
            } catch (error) {
                app.innerHTML = renderHeader() + `<div class="container"><a href="/" class="back-link">← Back</a><div class="error-message">Error: ${error.message}</div></div>` + renderFooter();
            }
        }

        function renderPhotoCard(photo, index) {
            return `
                <div class="photo-card fade-in" style="animation-delay: ${index * 50}ms">
                    <img src="/uploads/photos/${photo.filename}" alt="${photo.title || 'Photo'}" onclick="showLightbox('/uploads/photos/${photo.filename}')" loading="lazy">
                    <div class="photo-details">
                        ${photo.title ? `<div class="photo-title">${photo.title}</div>` : ''}
                        ${photo.description ? `<div class="photo-description">${photo.description}</div>` : ''}
                        <div class="rating-container" data-photo-id="${photo.id}">
                            <div class="rating-stars">
                                ${[1,2,3,4,5].map(star => `<span class="rating-star ${star <= (photo.userRating || 0) ? 'active' : ''}" data-star="${star}" onclick="ratePhoto(${photo.id}, ${star})">★</span>`).join('')}
                            </div>
                            <div class="rating-info">${photo.average_rating > 0 ? `${photo.average_rating}/5 (${photo.rating_count} votes)` : 'Not rated yet'} • ${formatDate(photo.created_at)}</div>
                            ${!currentUser ? `<div class="rating-login-prompt"><a onclick="showAuthModal('login')">Login</a> to rate</div>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function setupRatingListeners() {
            document.querySelectorAll('.rating-star').forEach(star => {
                star.addEventListener('mouseenter', (e) => {
                    const container = e.target.closest('.rating-container');
                    const stars = container.querySelectorAll('.rating-star');
                    const hoverStar = parseInt(e.target.dataset.star);
                    stars.forEach((s, i) => s.classList.toggle('active', i < hoverStar));
                });
                star.addEventListener('mouseleave', (e) => {
                    const container = e.target.closest('.rating-container');
                    const stars = container.querySelectorAll('.rating-star');
                    const currentRating = container.dataset.currentRating || 0;
                    stars.forEach((s, i) => s.classList.toggle('active', i < parseInt(currentRating)));
                });
            });
        }

        async function ratePhoto(photoId, score) {
            if (!currentUser) { showAuthModal('login'); return; }
            try {
                const result = await apiCall('/api/rate', { method: 'POST', body: JSON.stringify({ photo_id: photoId, score }) });
                const container = document.querySelector(`[data-photo-id="${photoId}"]`);
                container.querySelector('.rating-info').textContent = `${result.average_rating}/5 (${result.rating_count} votes)`;
                container.dataset.currentRating = score;
            } catch (error) { alert(error.message); }
        }

        function showLightbox(src) {
            const lightbox = document.createElement('div');
            lightbox.className = 'lightbox';
            lightbox.id = 'lightbox';
            lightbox.innerHTML = `<span class="lightbox-close" onclick="closeLightbox()">&times;</span><img src="${src}" alt="Preview">`;
            lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
            document.body.appendChild(lightbox);
        }

        function closeLightbox() { const lb = document.getElementById('lightbox'); if (lb) lb.remove(); }

        async function renderAdminLogin() {
            const app = document.getElementById('app');
            app.innerHTML = renderHeader(false) + `
                <div class="login-container">
                    <div class="login-box fade-in">
                        <h2>Admin Panel</h2>
                        <form onsubmit="handleAdminLogin(event)">
                            <div class="form-group"><label>Password:</label><input type="password" id="admin-password" required></div>
                            <div id="login-error" class="error-message" style="display:none;"></div>
                            <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
                        </form>
                        <div style="text-align:center;margin-top:20px;"><a href="/" class="back-link">← Back to home</a></div>
                    </div>
                </div>
            ` + renderFooter();
        }

        async function handleAdminLogin(e) {
            e.preventDefault();
            const errorEl = document.getElementById('login-error');
            try {
                await apiCall('/api/admin/login', { method: 'POST', body: JSON.stringify({ password: document.getElementById('admin-password').value }) });
                window.location.hash = '#/panel/dashboard';
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
            }
        }

        async function renderAdminDashboard() {
            const app = document.getElementById('app');
            app.innerHTML = renderHeader() + renderLoading() + renderFooter();
            try {
                const statusRes = await fetch(`${API_BASE}/api/admin/status`);
                const status = await statusRes.json();
                if (!status.authenticated) { window.location.hash = '#/panel'; return; }
            } catch (e) { window.location.hash = '#/panel'; return; }

            try {
                const albums = await apiCall('/api/albums');
                app.innerHTML = renderHeader() + `
                    <div class="container fade-in">
                        <div class="admin-actions-bar">
                            <button class="btn btn-primary" onclick="showCreateAlbumModal()">+ New Album</button>
                            <button class="btn btn-secondary" onclick="logoutAdmin()">Logout</button>
                        </div>
                        <h2 class="section-title">Albums</h2>
                        ${albums.length === 0 ? `<div class="empty-state"><h3>No albums</h3><p>Create your first album.</p></div>` : `
                            <div class="albums-grid">
                                ${albums.map((album, index) => `
                                    <div class="album-card admin-album-view" style="position:relative;animation-delay: ${index * 80}ms">
                                        <span class="edit-btn edit-btn-album" onclick="event.preventDefault();event.stopPropagation();document.getElementById('cover-upload-${album.id}').click()">✎</span>
                                        <input type="file" id="cover-upload-${album.id}" accept="image/*" style="display:none" onchange="uploadCoverFromDashboard(${album.id}, this.files[0])">
                                        <a href="/panel/album/${album.slug}" style="display:block;text-decoration:none;color:inherit;">
                                            <div class="album-cover-wrapper">
                                                ${album.cover_image ? `<img src="/uploads/albums/${album.cover_image}" alt="${album.title}" class="album-cover">` : `<div class="album-cover-placeholder">📷</div>`}
                                            </div>
                                            <div class="album-info">
                                                <div class="album-title">${album.title}</div>
                                                <div class="album-description">${album.short_description || 'No description'}</div>
                                                <div class="album-meta">${album.photo_count || 0} photos • ${formatDate(album.created_at)}</div>
                                            </div>
                                        </a>
                                        <div style="padding:15px;display:flex;gap:8px;flex-wrap:wrap;">
                                            <button class="btn btn-primary btn-small" onclick="event.preventDefault();showUploadPhotosModal(${album.id}, '${album.slug}', '${album.title.replace(/'/g, "\\'")}')">+ Photos</button>
                                            <button class="btn btn-secondary btn-small" onclick="showEditAlbumModal(${album.id})">Edit</button>
                                            <button class="btn btn-danger btn-small" onclick="deleteAlbum(${album.id})">Delete</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                ` + renderFooter();
            } catch (error) {
                app.innerHTML = renderHeader() + `<div class="container"><div class="error-message">Error: ${error.message}</div></div>` + renderFooter();
            }
        }

        async function renderAdminAlbum(slug) {
            const app = document.getElementById('app');
            app.innerHTML = renderHeader() + renderLoading() + renderFooter();
            try {
                const data = await apiCall(`/api/albums/${slug}`);
                app.innerHTML = renderHeader() + `
                    <div class="container fade-in">
                        <a href="/panel" class="back-link">← Back to Albums</a>
                        <div class="album-header">
                            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:15px;">
                                <h2>${data.album.title}</h2>
                                <div style="display:flex;gap:10px;">
                                    <button class="btn btn-primary" onclick="showUploadPhotosModal(${data.album.id}, '${data.album.slug}', '${data.album.title.replace(/'/g, "\\'")}')">+ Add Photos</button>
                                    <button class="btn btn-danger" onclick="deleteAlbum(${data.album.id})">Delete Album</button>
                                </div>
                            </div>
                            ${data.album.full_description ? `<p class="album-full-description">${data.album.full_description}</p>` : ''}
                        </div>
                        <div class="admin-cover-section">
                            <h3>Cover Photo</h3>
                            ${data.album.cover_image ? `
                                <div style="position:relative;display:inline-block;">
                                    <img src="/uploads/albums/${data.album.cover_image}" alt="Cover" style="max-width:300px;border-radius:12px;">
                                    <span class="edit-btn" style="position:absolute;top:10px;right:10px;" onclick="document.getElementById('cover-upload').click()">✎</span>
                                </div>
                            ` : `
                                <div style="text-align:center;padding:40px;border:2px dashed var(--border-subtle);border-radius:12px;">
                                    <p style="margin-bottom:15px;">No cover photo</p>
                                    <button class="btn btn-primary" onclick="document.getElementById('cover-upload').click()">Upload Cover</button>
                                </div>
                            `}
                            <input type="file" id="cover-upload" accept="image/*" style="display:none" onchange="uploadCoverPhoto(${data.album.id}, this.files[0])">
                        </div>
                        ${data.photos.length === 0 ? `<div class="empty-state"><h3>No photos</h3><button class="btn btn-primary" onclick="showUploadPhotosModal(${data.album.id}, '${data.album.slug}', '${data.album.title.replace(/'/g, "\\'")}')">Add Photos</button></div>` : `
                            <div class="photos-grid">
                                ${data.photos.map((photo, index) => `
                                    <div class="photo-card admin-photo-edit" style="position:relative;">
                                        <span class="edit-btn" onclick="showEditPhotoModal(${photo.id}, '${photo.title || ''}', '${photo.description || ''}')">✎</span>
                                        <img src="/uploads/photos/${photo.filename}" alt="${photo.title || 'Photo'}" onclick="showLightbox('/uploads/photos/${photo.filename}')" loading="lazy">
                                        <div class="photo-details">
                                            ${photo.title ? `<div class="photo-title">${photo.title}</div>` : ''}
                                            ${photo.description ? `<div class="photo-description">${photo.description}</div>` : ''}
                                            <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;">
                                                <div class="rating-info">${photo.average_rating > 0 ? `${photo.average_rating}/5 (${photo.rating_count})` : 'Not rated'} • ${formatDate(photo.created_at)}</div>
                                                <button class="btn btn-danger btn-small" onclick="deletePhoto(${photo.id})">Delete</button>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                ` + renderFooter();
            } catch (error) {
                app.innerHTML = renderHeader() + `<div class="container"><a href="/panel" class="back-link">← Back</a><div class="error-message">Error: ${error.message}</div></div>` + renderFooter();
            }
        }

        function showModal(content) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.id = 'modal-overlay';
            overlay.innerHTML = `<div class="modal">${content}</div>`;
            overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
            document.body.appendChild(overlay);
        }

        function closeModal() { const o = document.getElementById('modal-overlay'); if (o) o.remove(); }

        function showCreateAlbumModal() {
            showModal(`
                <h3>Create new album</h3>
                <form onsubmit="handleCreateAlbum(event)">
                    <div class="form-group"><label>Album title:</label><input type="text" id="album-title" required></div>
                    <div class="form-group"><label>Short description (max 50 chars):</label><input type="text" id="album-short-desc" maxlength="50"></div>
                    <div class="form-group"><label>Full description (optional):</label><textarea id="album-full-desc" rows="3"></textarea></div>
                    <div class="form-group"><label>Cover:</label><input type="file" id="album-cover" accept="image/*"></div>
                    <div id="album-error" class="error-message" style="display:none;"></div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create</button>
                    </div>
                </form>
            `);
        }

        async function handleCreateAlbum(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('title', document.getElementById('album-title').value);
            formData.append('short_description', document.getElementById('album-short-desc').value);
            formData.append('full_description', document.getElementById('album-full-desc').value);
            const coverFile = document.getElementById('album-cover').files[0];
            if (coverFile) formData.append('cover', coverFile);
            try {
                const response = await fetch(`${API_BASE}/api/admin/albums`, { method: 'POST', body: formData, headers: getAdminHeaders() });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                closeModal(); renderAdminDashboard();
            } catch (error) {
                document.getElementById('album-error').textContent = error.message; document.getElementById('album-error').style.display = 'block';
            }
        }

        async function showEditAlbumModal(albumId) {
            const albums = await apiCall('/api/albums');
            const album = albums.find(a => a.id === albumId);
            if (!album) return;
            showModal(`
                <h3>Edit album</h3>
                <form onsubmit="handleEditAlbum(event, ${albumId})">
                    <div class="form-group"><label>Album title:</label><input type="text" id="edit-album-title" value="${album.title}" required></div>
                    <div class="form-group"><label>Short description (max 50 chars):</label><input type="text" id="edit-album-short-desc" value="${album.short_description || ''}" maxlength="50"></div>
                    <div class="form-group"><label>Full description:</label><textarea id="edit-album-full-desc" rows="3">${album.full_description || ''}</textarea></div>
                    <div class="form-group"><label>New cover (optional):</label><input type="file" id="edit-album-cover" accept="image/*"></div>
                    <div id="edit-album-error" class="error-message" style="display:none;"></div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            `);
        }

        async function handleEditAlbum(e, albumId) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('title', document.getElementById('edit-album-title').value);
            formData.append('short_description', document.getElementById('edit-album-short-desc').value);
            formData.append('full_description', document.getElementById('edit-album-full-desc').value);
            const coverFile = document.getElementById('edit-album-cover').files[0];
            if (coverFile) formData.append('cover', coverFile);
            try {
                const response = await fetch(`${API_BASE}/api/admin/albums/${albumId}`, { method: 'PUT', body: formData, headers: getAdminHeaders() });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                closeModal(); renderAdminDashboard();
            } catch (error) {
                document.getElementById('edit-album-error').textContent = error.message; document.getElementById('edit-album-error').style.display = 'block';
            }
        }

        async function deleteAlbum(albumId) {
            if (!confirm('Are you sure you want to delete this album? All photos will also be deleted.')) return;
            try { await apiCall(`/api/admin/albums/${albumId}`, { method: 'DELETE' }); renderAdminDashboard(); }
            catch (error) { alert(error.message); }
        }

        function showUploadPhotosModal(albumId, slug, title) {
            selectedFiles = [];
            showModal(`
                <h3>Add photos to: ${title}</h3>
                <div class="upload-zone" id="upload-zone" onclick="document.getElementById('photo-input').click()">
                    <p>Click or drag photos here</p>
                    <input type="file" id="photo-input" multiple accept="image/*" style="display:none" onchange="handleFileSelect(event)">
                </div>
                <div id="selected-files"></div>
                <div class="upload-progress" style="display:none;" id="upload-progress"><div class="upload-progress-bar" id="upload-progress-bar" style="width:0%"></div></div>
                <div class="form-group" style="margin-top:20px;"><label>Photo title (optional):</label><input type="text" id="photo-title"></div>
                <div class="form-group"><label>Photo description (optional):</label><textarea id="photo-desc" rows="2"></textarea></div>
                <div id="upload-error" class="error-message" style="display:none;"></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="upload-btn" onclick="handleUploadPhotos(event, ${albumId})">Upload</button>
                </div>
            `);
            setupUploadZone();
        }

        let selectedFiles = [];
        function handleFileSelect(e) { selectedFiles = [...selectedFiles, ...Array.from(e.target.files)]; renderSelectedFiles(); }
        function renderSelectedFiles() {
            document.getElementById('selected-files').innerHTML = selectedFiles.map((file, i) => `
                <div class="photo-upload-item"><img src="${URL.createObjectURL(file)}" alt="Preview"><div class="photo-upload-info"><strong>${file.name}</strong><br><small>${(file.size/1024).toFixed(1)} KB</small></div><button class="btn btn-danger btn-small" onclick="removeFile(${i})">✕</button></div>
            `).join('');
        }
        function removeFile(i) { selectedFiles.splice(i, 1); renderSelectedFiles(); }
        function setupUploadZone() {
            const zone = document.getElementById('upload-zone');
            zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
            zone.addEventListener('drop', (e) => { e.preventDefault(); zone.classList.remove('dragover'); selectedFiles = [...selectedFiles, ...Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'))]; renderSelectedFiles(); });
        }

        async function handleUploadPhotos(e, albumId) {
            if (selectedFiles.length === 0) { alert('Select at least one photo'); return; }
            const errorEl = document.getElementById('upload-error');
            const progressEl = document.getElementById('upload-progress');
            const progressBar = document.getElementById('upload-progress-bar');
            errorEl.style.display = 'none'; progressEl.style.display = 'block';
            let uploaded = 0;
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                const formData = new FormData();
                formData.append('photo', file);
                formData.append('album_id', albumId);
                formData.append('title', document.getElementById('photo-title').value);
                formData.append('description', document.getElementById('photo-desc').value);
                try {
                    const response = await fetch(`${API_BASE}/api/admin/photos`, { method: 'POST', body: formData, headers: getAdminHeaders() });
                    if (!response.ok) throw new Error((await response.json()).error);
                    uploaded++; progressBar.style.width = `${((i+1)/selectedFiles.length)*100}%`;
                } catch (error) { errorEl.textContent = `Error uploading ${file.name}: ${error.message}`; errorEl.style.display = 'block'; }
            }
            if (uploaded > 0) { alert(`Uploaded ${uploaded} photo${uploaded>1?'s':''}!`); closeModal(); }
        }

        function getAdminHeaders() { return {}; }

        function uploadCoverPhoto(albumId, file) {
            if (!file) return;
            const formData = new FormData(); formData.append('cover', file);
            fetch(`${API_BASE}/api/admin/albums/${albumId}`, { method: 'PUT', body: formData, headers: getAdminHeaders() })
                .then(res => res.json()).then(() => renderAdminAlbum(window.location.pathname.replace('/panel/album/', '')))
                .catch(err => alert('Error: ' + err.message));
        }

        function uploadCoverFromDashboard(albumId, file) {
            if (!file) return;
            const formData = new FormData(); formData.append('cover', file);
            fetch(`${API_BASE}/api/admin/albums/${albumId}`, { method: 'PUT', body: formData, headers: getAdminHeaders() })
                .then(res => res.json()).then(() => renderAdminDashboard())
                .catch(err => alert('Error: ' + err.message));
        }

        async function logoutAdmin() {
            try { await apiCall('/api/admin/logout', { method: 'POST' }); } catch (e) {}
            window.location.hash = '#/';
        }

        function showEditPhotoModal(photoId, currentTitle, currentDescription) {
            showModal(`
                <h3>Edit Photo</h3>
                <form onsubmit="handleEditPhoto(event, ${photoId})">
                    <div class="form-group"><label>Title:</label><input type="text" id="edit-photo-title" value="${currentTitle}"></div>
                    <div class="form-group"><label>Description:</label><textarea id="edit-photo-desc" rows="3">${currentDescription}</textarea></div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-danger" onclick="deletePhoto(${photoId})">Delete</button>
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            `);
        }

        async function handleEditPhoto(e, photoId) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('title', document.getElementById('edit-photo-title').value);
            formData.append('description', document.getElementById('edit-photo-desc').value);
            fetch(`${API_BASE}/api/admin/photos/${photoId}`, { method: 'PUT', body: formData, headers: getAdminHeaders() })
                .then(res => res.json()).then(() => { closeModal(); renderAdminAlbum(window.location.pathname.replace('/panel/album/', '')); })
                .catch(err => alert('Error: ' + err.message));
        }

        async function deletePhoto(photoId) {
            if (!confirm('Delete this photo?')) return;
            fetch(`${API_BASE}/api/admin/photos/${photoId}`, { method: 'DELETE', headers: getAdminHeaders() })
                .then(res => res.json()).then(() => renderAdminAlbum(window.location.pathname.replace('/panel/album/', '')))
                .catch(err => alert('Error: ' + err.message));
        }

        function showAuthModal(mode = 'login') {
            showModal(mode === 'login' ? renderLoginForm() : renderRegisterForm());
        }

        function renderLoginForm() {
            return `
                <h3>Login</h3>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group"><label>Username:</label><input type="text" id="login-username" required></div>
                    <div class="form-group"><label>Password:</label><input type="password" id="login-password" required></div>
                    <div id="login-form-error" class="error-message" style="display:none;"></div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="showAuthModal('register')">No account?</button>
                        <button type="submit" class="btn btn-primary">Login</button>
                    </div>
                </form>
            `;
        }

        function renderRegisterForm() {
            return `
                <h3>Register</h3>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group"><label>Username:</label><input type="text" id="register-username" required minlength="3"></div>
                    <div class="form-group"><label>Password:</label><input type="password" id="register-password" required minlength="4"></div>
                    <div id="register-form-error" class="error-message" style="display:none;"></div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="showAuthModal('login')">Have an account?</button>
                        <button type="submit" class="btn btn-primary">Register</button>
                    </div>
                </form>
            `;
        }

        async function handleLogin(e) {
            e.preventDefault();
            const errorEl = document.getElementById('login-form-error');
            try {
                const data = await apiCall('/api/login', { method: 'POST', body: JSON.stringify({ username: document.getElementById('login-username').value, password: document.getElementById('login-password').value }) });
                saveUserToStorage(data.user, data.token); closeModal(); if (window.location.pathname.includes('/album/')) window.location.reload();
            } catch (error) { errorEl.textContent = error.message; errorEl.style.display = 'block'; }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const errorEl = document.getElementById('register-form-error');
            try {
                const data = await apiCall('/api/register', { method: 'POST', body: JSON.stringify({ username: document.getElementById('register-username').value, password: document.getElementById('register-password').value }) });
                saveUserToStorage(data.user, data.token); closeModal(); if (window.location.pathname.includes('/album/')) window.location.reload();
            } catch (error) { errorEl.textContent = error.message; errorEl.style.display = 'block'; }
        }

        function logout() { clearUserFromStorage(); if (window.location.pathname.includes('/album/')) window.location.reload(); }

        function router() {
            const hash = window.location.hash;
            const path = window.location.pathname;
            if (path.startsWith('/panel/album/')) { renderAdminAlbum(path.replace('/panel/album/', '').replace(/\/$/, '')); }
            else if (hash === '#/panel/dashboard' || path === '/panel/dashboard') { renderAdminDashboard(); }
            else if (hash.startsWith('#/album/')) { renderAlbum(hash.replace('#/album/', '')); }
            else if (hash === '#/panel') { renderAdminLogin(); }
            else if (path.startsWith('/album/')) { renderAlbum(path.replace('/album/', '').replace(/\/$/, '')); }
            else if (path === '/panel') { renderAdminLogin(); }
            else { renderHome(); }
        }

        window.addEventListener('hashchange', router);
        window.addEventListener('load', () => { loadUserFromStorage(); router(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeLightbox(); closeModal(); } });
    </script>
</body>
</html>
